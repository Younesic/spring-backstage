# Publishes the generator (parent + annotations + core + maven-plugin) to GitHub Packages on every
# push to main. Uses the repository's built-in GITHUB_TOKEN, which has packages:write for THIS repo —
# so no personal access token is needed to publish. Example modules set maven.deploy.skip=true.
name: Publish to GitHub Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github-packages
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Deploy to GitHub Packages
        run: mvn -B -ntp -DskipTests deploy
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ github.token }}
